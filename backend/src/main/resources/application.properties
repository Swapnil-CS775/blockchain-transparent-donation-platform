spring.application.name=backend

spring.datasource.url=jdbc:mysql://localhost:3306/ngo_system
spring.datasource.username=ngo_user
spring.datasource.password=password123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8081

jwt.secret=${JWT_SECRET:CHANGE_THIS_TO_LONG_RANDOM_SECRET_KEY_256_BITS_MINIMUM}
jwt.expiration=900000

# Signzy Configuration
signzy.base-url=https://sandbox.signzy.app
signzy.api-key=YOUR_SANDBOX_API_KEY
signzy.client-id=YOUR_CLIENT_ID
signzy.client-secret=YOUR_CLIENT_SECRET


crypto.secret=${CRYPTO_SECRET:CHANGE_THIS_TO_32_BYTE_SECRET_KEY_123456}

blockchain.rpc-url=http://127.0.0.1:8545
blockchain.contract-address=0x5FbDB2315678afecb367f032d93F642f64180aa3
blockchain.admin-private-key=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80


ipfs.api-url=http://127.0.0.1:5001
ipfs.gateway-url=http://127.0.0.1:8080
# IPFS Node Configuration
ipfs.node.address=/ip4/127.0.0.1/tcp/5001

blockchain.enabled=true
signzy.enabled=false

encryption.secret=A1B2C3D4E5F6G7H8I9J0K1L2M3N4O5P6

# Multipart Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.file-size-threshold=2KB

# Blockchain Contract Addresses
contracts.ngo-factory=0xYourNgoFactoryAddress...
contracts.donation-manager=0xYourDonationManagerAddress...
contracts.reputation-manager=0xYourReputationAddress...
contracts.token-contract=0xYourTokenAddress...